<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Crop</title>

  <style>
    .banner {
      width: 100%;
      height: 400px;

      /* imagem */
      background-image: url('https://picsum.photos/1200/800');

      /* crop automático */
      background-size: cover;
      

      /* posicionamento */
      background-position: center;
  </style>
</head>
<body>

  <div class="banner"></div>
  <div>Ola</div>
  <div>Ola</div>
  <div>Ola</div>
  <div>Ola</div>
  <div>Ola</div>
  <div>Ola</div>
  <div>Ola</div>
  <div>Ola</div>

</body>
</html>
